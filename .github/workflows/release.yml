name: Build FlyingDamage wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod version'
        required: true
        default: '4.0.0'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.3.0.1'
      make_release:
        description: 'Create/update GitHub Release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  MOD_ID: 'com.author.flyingdamage'
  MOD_NAME: 'Flying Damage'
  MOD_DESCRIPTION: 'AS3 VehicleMarker-style damage label logic port.'
  FLEX_VERSION: '4.16.1'
  FLASH_PLAYER_VERSION: '32.0'
  SWF_VERSION: '39'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java for Flex
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil

      - name: Download Flex SDK
        shell: pwsh
        run: |
          $url = "https://archive.apache.org/dist/flex/$env:FLEX_VERSION/binaries/apache-flex-sdk-$env:FLEX_VERSION-bin.zip"
          Invoke-WebRequest -Uri $url -OutFile flex-sdk.zip -UseBasicParsing -TimeoutSec 300
          New-Item -ItemType Directory -Force -Path C:\flex-sdk | Out-Null
          Expand-Archive -Path flex-sdk.zip -DestinationPath C:\flex-sdk-temp -Force
          $items = Get-ChildItem C:\flex-sdk-temp
          if ($items.Count -eq 1 -and $items[0].PSIsContainer) {
            Get-ChildItem $items[0].FullName | Move-Item -Destination C:\flex-sdk -Force
          } else {
            Get-ChildItem C:\flex-sdk-temp | Move-Item -Destination C:\flex-sdk -Force
          }
          Remove-Item flex-sdk.zip -Force -ErrorAction SilentlyContinue
          Remove-Item C:\flex-sdk-temp -Recurse -Force -ErrorAction SilentlyContinue

      - name: Decode bundled assets
        run: python tools/decode_assets.py

      - name: Setup playerglobal.swc
        shell: pwsh
        run: |
          if (-not (Test-Path as3\libs\playerglobal.swc)) { throw 'Missing as3\libs\playerglobal.swc' }
          $playerDir = "C:\flex-sdk\frameworks\libs\player\$env:FLASH_PLAYER_VERSION"
          New-Item -ItemType Directory -Force -Path $playerDir | Out-Null
          Copy-Item as3\libs\playerglobal.swc "$playerDir\playerglobal.swc" -Force
          Copy-Item as3\libs\playerglobal.swc "C:\flex-sdk\frameworks\libs\player\playerglobal.swc" -Force
          $flexConfig = 'C:\flex-sdk\frameworks\flex-config.xml'
          if (Test-Path $flexConfig) {
            $content = Get-Content $flexConfig -Raw
            $content = $content -replace '\{playerglobalHome\}', 'C:/flex-sdk/frameworks/libs/player'
            $content | Set-Content $flexConfig -Encoding UTF8
          }

      - name: Compile AS3 SWF
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources\in\gui\flash | Out-Null
          $args = @(
            '-source-path+=as3\src_flash\src',
            '-static-link-runtime-shared-libraries=true',
            '-use-network=false',
            "-target-player=$env:FLASH_PLAYER_VERSION",
            "-swf-version=$env:SWF_VERSION",
            '-default-size=2560,1369',
            '-output=resources\in\gui\flash\FlyingDamageApp.swf'
          )
          Get-ChildItem as3\libs -Filter *.swc -Recurse | ForEach-Object {
            if ($_.Name -eq 'playerglobal.swc') {
              $args += "-library-path+=$($_.FullName)"
            } else {
              $args += "-external-library-path+=$($_.FullName)"
            }
          }
          $args += 'as3\src_flash\src\com\flyingdamage\FlyingDamageApp.as'
          & 'C:\flex-sdk\bin\mxmlc.bat' @args
          if ($LASTEXITCODE -ne 0) { throw "mxmlc failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path resources\in\gui\flash\FlyingDamageApp.swf)) { throw 'SWF compile failed' }

      - name: Install Python 2.7 for pyc compile
        shell: pwsh
        run: |
          choco install python2 -y --no-progress
          if (-not (Test-Path 'C:\Python27\python.exe')) { throw 'Python 2.7 not found at C:\Python27\python.exe' }
          & 'C:\Python27\python.exe' --version

      - name: Resolve version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
            $game = '${{ inputs.game_version }}'
          } elseif ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
            $game = '2.3.0.1'
          } else {
            $version = '4.0.0'
            $game = '2.3.0.1'
          }
          echo "PROJECT_VERSION=$version" >> $env:GITHUB_ENV
          echo "GAME_VERSION=$game" >> $env:GITHUB_ENV

      - name: Write build.json
        shell: pwsh
        run: |
          $json = @{
            version = 5
            software = @{ animate = ' '; python = 'C:/Python27/python.exe' }
            game = @{ force = $false; folder = 'World_of_Tanks_EU'; version = $env:GAME_VERSION }
            info = @{ id = $env:MOD_ID; name = $env:MOD_NAME; description = $env:MOD_DESCRIPTION; version = $env:PROJECT_VERSION }
          } | ConvertTo-Json -Depth 6
          $json | Set-Content build.json -Encoding UTF8
          Get-Content build.json

      - name: Build wotmod
        run: python build.py --distribute

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: flyingdamage-${{ env.PROJECT_VERSION }}
          path: |
            build/*.wotmod
            build/*.zip

      - name: Create or update release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: v${{ env.PROJECT_VERSION }}
          commit: ${{ github.sha }}
          artifacts: build/*.wotmod,build/*.zip
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
