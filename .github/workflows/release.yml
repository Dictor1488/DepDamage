name: Build FlyingDamage wotmod

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod version'
        required: true
        default: '3.3.0'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.3.0.1'
      make_release:
        description: 'Create/update GitHub Release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  FLEX_VERSION: '4.16.1'
  FLASH_PLAYER_VERSION: '32.0'
  SWF_VERSION: '39'
  MOD_ID: 'com.author.flyingdamage'
  MOD_NAME: 'Flying Damage'
  MOD_DESCRIPTION: 'Floating damage numbers above tanks. World-anchor / XVM-like projection mode, screen fallback, smooth rise + fade.'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil

      - name: Install Java for Flex
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Flex SDK
        id: cache-flex
        uses: actions/cache@v4
        with:
          path: C:\flex-sdk
          key: flex-sdk-${{ env.FLEX_VERSION }}-v4

      - name: Download Apache Flex SDK
        if: steps.cache-flex.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $urls = @(
            "https://archive.apache.org/dist/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip",
            "https://dlcdn.apache.org/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip"
          )
          $ok = $false
          foreach ($url in $urls) {
            try {
              Write-Host "Downloading $url"
              Invoke-WebRequest -Uri $url -OutFile flex-sdk.zip -UseBasicParsing -TimeoutSec 300
              $ok = $true
              break
            } catch {
              Write-Host "Failed: $_"
            }
          }
          if (-not $ok) { throw 'Could not download Apache Flex SDK' }
          New-Item -ItemType Directory -Force -Path C:\flex-sdk | Out-Null
          Expand-Archive -Path flex-sdk.zip -DestinationPath C:\flex-sdk-temp -Force
          $items = Get-ChildItem C:\flex-sdk-temp
          if ($items.Count -eq 1 -and $items[0].PSIsContainer) {
            Get-ChildItem $items[0].FullName | Move-Item -Destination C:\flex-sdk -Force
          } else {
            Get-ChildItem C:\flex-sdk-temp | Move-Item -Destination C:\flex-sdk -Force
          }

      - name: Setup playerglobal.swc
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = 'as3\libs\playerglobal.swc'
          if (-not (Test-Path $src)) { throw "Missing $src" }
          $playerDir = 'C:\flex-sdk\frameworks\libs\player\32.0'
          New-Item -ItemType Directory -Force -Path $playerDir | Out-Null
          Copy-Item $src "$playerDir\playerglobal.swc" -Force
          Copy-Item $src 'C:\flex-sdk\frameworks\libs\player\playerglobal.swc' -Force
          $cfg = 'C:\flex-sdk\frameworks\flex-config.xml'
          if (Test-Path $cfg) {
            (Get-Content $cfg -Raw) -replace '\{playerglobalHome\}', 'C:/flex-sdk/frameworks/libs/player' | Set-Content $cfg -Encoding UTF8
          }

      - name: Build FlyingDamageApp.swf
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $mxmlc = 'C:\flex-sdk\bin\mxmlc.bat'
          if (-not (Test-Path $mxmlc)) { throw "mxmlc not found: $mxmlc" }
          New-Item -ItemType Directory -Force -Path as3\bin | Out-Null

          $args = @(
            '-source-path+=as3\src_flash\src',
            '-library-path+=as3\libs\playerglobal.swc',
            '-external-library-path+=as3\libs\common-1.0-SNAPSHOT.swc',
            '-external-library-path+=as3\libs\common_i18n_library-1.0-SNAPSHOT.swc',
            '-external-library-path+=as3\libs\base_app-1.0-SNAPSHOT.swc',
            '-external-library-path+=as3\libs\gui_base-1.0-SNAPSHOT.swc',
            '-external-library-path+=as3\libs\gui_lobby-1.0-SNAPSHOT.swc',
            '-external-library-path+=as3\libs\gui_battle-1.0-SNAPSHOT.swc',
            '-external-library-path+=as3\libs\lobby.swc',
            '-external-library-path+=as3\libs\battle.swc',
            '-target-player=${{ env.FLASH_PLAYER_VERSION }}',
            '-swf-version=${{ env.SWF_VERSION }}',
            '-strict=true',
            '-optimize=true',
            '-warnings=true',
            '-output=as3\bin\FlyingDamageApp.swf',
            'as3\src_flash\src\com\flyingdamage\FlyingDamageApp.as'
          )

          & $mxmlc @args
          if ($LASTEXITCODE -ne 0) { throw "mxmlc failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path as3\bin\FlyingDamageApp.swf)) { throw 'SWF was not created' }

      - name: Copy SWF into resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources\in\gui\flash | Out-Null
          Copy-Item as3\bin\FlyingDamageApp.swf resources\in\gui\flash\FlyingDamageApp.swf -Force
          Get-Item resources\in\gui\flash\FlyingDamageApp.swf

      - name: Resolve version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
            $game = '${{ inputs.game_version }}'
          } elseif ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
            $game = '2.3.0.1'
          } else {
            $version = '3.3.0'
            $game = '2.3.0.1'
          }
          echo "PROJECT_VERSION=$version" >> $env:GITHUB_ENV
          echo "GAME_VERSION=$game" >> $env:GITHUB_ENV

      - name: Write build.json
        shell: pwsh
        run: |
          $json = @{
            version = 5
            software = @{ animate = ' '; python = 'C:/Python27/python.exe' }
            game = @{ force = $false; folder = 'World_of_Tanks_EU'; version = $env:GAME_VERSION }
            info = @{ id = $env:MOD_ID; name = $env:MOD_NAME; description = $env:MOD_DESCRIPTION; version = $env:PROJECT_VERSION }
          } | ConvertTo-Json -Depth 6
          $json | Set-Content build.json -Encoding UTF8
          Get-Content build.json

      - name: Build wotmod
        run: python build.py --distribute

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: flyingdamage-${{ env.PROJECT_VERSION }}
          path: |
            build/*.wotmod
            as3/bin/FlyingDamageApp.swf

      - name: Create or update release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main'
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: v${{ env.PROJECT_VERSION }}
          commit: ${{ github.sha }}
          artifacts: build/*.wotmod
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
